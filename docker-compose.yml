services:
  postgres:
    image: postgres:15-alpine
    container_name: c2c-platform-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_MULTIPLE_DATABASES: admin_mod_db, auth_db, chat_db, order_db, product_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multiple-db.sh:/docker-entrypoint-initdb.d/init-multiple-db.sh
      - ./libs/prisma-clients:/docker-entrypoint-initdb.d/prisma-clients:ro
      - ./db/seeds:/docker-entrypoint-initdb.d/seeds:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: c2c-platform-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@c2cplatform.com
      PGADMIN_DEFAULT_PASSWORD: 123456
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./docker/pgadmin/pgpass:/pgpass:ro

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        - APP_NAME=api-gateway
    container_name: c2c-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Ánh xạ thư mục vật lý để chứa ảnh upload
      - ./uploads:/app/public/uploads/products
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=123456
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: c2c-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  pgadmin_data: