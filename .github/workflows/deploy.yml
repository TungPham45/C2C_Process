name: CI/CD C2C Platform

on:
  push:
    branches: [main]

jobs:
  # ── BƯỚC 1: Kiểm duyệt toàn bộ (Test & Build) ──────
  ci-checks:
    name: CI Checks (Test & Build)
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for nx affected

      - name: Derive SHAs for nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma clients (Parallel)
        run: |
          npx prisma generate --schema=libs/prisma-clients/auth-client/schema.prisma &
          npx prisma generate --schema=libs/prisma-clients/product-client/schema.prisma &
          npx prisma generate --schema=libs/prisma-clients/order-client/schema.prisma &
          npx prisma generate --schema=libs/prisma-clients/chat-client/schema.prisma &
          npx prisma generate --schema=libs/prisma-clients/admin-mod-client/schema.prisma &
          wait

      - name: Run tests (Affected Only)
        run: npx nx affected --target=test --parallel=3 --passWithNoTests

      - name: Build applications (Affected Only)
        run: npx nx affected --target=build --parallel=6

  # ── BƯỚC 2: Triển khai (Chỉ chạy khi BƯỚC 1 xanh) ──
  deploy:
    name: Deploy to Server
    runs-on: self-hosted
    needs: ci-checks
    steps:
      - name: Deploy
        run: |
          cd /home/tung/c2c-platform-run
          git pull origin main
          bash scripts/deploy.sh