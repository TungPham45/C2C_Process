name: Deploy C2C Platform

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to VB Server via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Deploy ia SSH Action
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            cd /home/tung/c2c-platform-run
            bash scripts/deploy.sh
            echo "Deploy done!"